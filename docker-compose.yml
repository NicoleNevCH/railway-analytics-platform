# Railway Analytics Platform — local lakehouse orchestration.
#
# Brings up the whole stack: MinIO (local S3) + bucket creation + Spark
# (master/worker) + ingestion API (FastAPI/Pydantic) + consumption API
# (FastAPI/DuckDB) + Jupyter lab.
#
# Flow: simulator -> ingestion-api -> MinIO (Bronze) -> Spark (Iceberg/Silver)
#       -> DuckDB (consumption-api / Jupyter).

# ---------------------------------------------------------------------------
# Block of S3/MinIO variables reused by several services (DRY).
# The values come from the .env file (see .env.example).
# ---------------------------------------------------------------------------
x-s3-env: &s3-env
  S3_ENDPOINT: "http://minio:9000"
  S3_ACCESS_KEY: "${MINIO_ROOT_USER:-minioadmin}"
  S3_SECRET_KEY: "${MINIO_ROOT_PASSWORD:-minioadmin}"
  S3_REGION: "${S3_REGION:-us-east-1}"
  BRONZE_BUCKET: "${BRONZE_BUCKET:-bronze}"
  SILVER_BUCKET: "${SILVER_BUCKET:-silver}"
  ERRORS_BUCKET: "${ERRORS_BUCKET:-errors}"

services:
  # -------------------------------------------------------------------------
  # MinIO — S3-compatible storage. Holds Bronze, Silver and Errors.
  # -------------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    container_name: railway-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-minioadmin}"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    volumes:
      - minio-data:/data
    networks:
      - railway

  # -------------------------------------------------------------------------
  # Bucket initialization via mc (MinIO Client). Waits for MinIO to be ready,
  # creates the buckets idempotently and exits (exit 0).
  # The minio/minio (server) image ships no curl; therefore MinIO's health
  # check is done here, with "mc ready", and the other services depend on the
  # successful completion of this init.
  # -------------------------------------------------------------------------
  minio-init:
    image: minio/mc:RELEASE.2024-10-08T09-37-26Z
    container_name: railway-minio-init
    depends_on:
      - minio
    environment:
      <<: *s3-env
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        echo "Waiting for MinIO to respond..."
        until mc alias set local "$$S3_ENDPOINT" "$$S3_ACCESS_KEY" "$$S3_SECRET_KEY" >/dev/null 2>&1; do
          sleep 2
        done
        mc ready local
        for b in "$$BRONZE_BUCKET" "$$SILVER_BUCKET" "$$ERRORS_BUCKET"; do
          mc mb --ignore-existing "local/$$b"
          echo "bucket ready: $$b"
        done
        echo "Buckets created successfully."
    networks:
      - railway

  # -------------------------------------------------------------------------
  # Spark Master — coordinates the cluster (local standalone mode).
  # Custom image (spark/Dockerfile) with the Iceberg + S3A jars baked in.
  # -------------------------------------------------------------------------
  spark-master:
    build:
      context: .
      dockerfile: spark/Dockerfile
    image: railway/spark:3.5.1-iceberg
    container_name: railway-spark-master
    environment:
      <<: *s3-env
      SPARK_MODE: "master"
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: "no"
      SPARK_SSL_ENABLED: "no"
      # Job parameters read via os.getenv in bronze_to_silver.py
      ICEBERG_WAREHOUSE: "s3://${SILVER_BUCKET:-silver}/warehouse"
      ICEBERG_CATALOG: "lakehouse"
      ICEBERG_NAMESPACE: "${ICEBERG_NAMESPACE:-railway}"
      ICEBERG_TABLE: "${ICEBERG_TABLE:-train_events}"
      DELAY_THRESHOLD_MIN: "${DELAY_THRESHOLD_MIN:-5}"
      # AWS SDK default chain (defensive, for Iceberg's S3FileIO)
      AWS_REGION: "${S3_REGION:-us-east-1}"
      AWS_ACCESS_KEY_ID: "${MINIO_ROOT_USER:-minioadmin}"
      AWS_SECRET_ACCESS_KEY: "${MINIO_ROOT_PASSWORD:-minioadmin}"
    ports:
      - "7077:7077"   # Spark master RPC
      - "8080:8080"   # Spark master UI
    volumes:
      - ./spark/jobs:/opt/bitnami/spark/jobs:ro
    depends_on:
      minio-init:
        condition: service_completed_successfully
    networks:
      - railway

  # -------------------------------------------------------------------------
  # Spark Worker — runs the tasks. Points at the master.
  # -------------------------------------------------------------------------
  spark-worker:
    image: railway/spark:3.5.1-iceberg
    container_name: railway-spark-worker
    environment:
      <<: *s3-env
      SPARK_MODE: "worker"
      SPARK_MASTER_URL: "spark://spark-master:7077"
      SPARK_WORKER_MEMORY: "${SPARK_WORKER_MEMORY:-2G}"
      SPARK_WORKER_CORES: "${SPARK_WORKER_CORES:-2}"
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: "no"
      SPARK_SSL_ENABLED: "no"
      AWS_REGION: "${S3_REGION:-us-east-1}"
      AWS_ACCESS_KEY_ID: "${MINIO_ROOT_USER:-minioadmin}"
      AWS_SECRET_ACCESS_KEY: "${MINIO_ROOT_PASSWORD:-minioadmin}"
    ports:
      - "8081:8081"   # Spark worker UI
    depends_on:
      - spark-master
    networks:
      - railway

  # -------------------------------------------------------------------------
  # Ingestion API — validates the contract (Pydantic) and writes Bronze/DLQ.
  # -------------------------------------------------------------------------
  ingestion-api:
    build:
      context: .
      dockerfile: ingestion_api/Dockerfile
    image: railway/ingestion-api:1.0.0
    container_name: railway-ingestion-api
    environment:
      <<: *s3-env
    ports:
      - "8000:8000"
    depends_on:
      minio-init:
        condition: service_completed_successfully
    networks:
      - railway

  # -------------------------------------------------------------------------
  # Consumption API — DuckDB querying the Iceberg table (logical Gold layer).
  # -------------------------------------------------------------------------
  consumption-api:
    build:
      context: .
      dockerfile: consumption_api/Dockerfile
    image: railway/consumption-api:1.0.0
    container_name: railway-consumption-api
    environment:
      <<: *s3-env
      ICEBERG_WAREHOUSE_PREFIX: "warehouse"
      ICEBERG_NAMESPACE: "${ICEBERG_NAMESPACE:-railway}"
      ICEBERG_TABLE: "${ICEBERG_TABLE:-train_events}"
    ports:
      - "8001:8001"
    depends_on:
      minio-init:
        condition: service_completed_successfully
    networks:
      - railway

  # -------------------------------------------------------------------------
  # Jupyter — lab for interactive exploration (DuckDB directly over Iceberg).
  # -------------------------------------------------------------------------
  jupyter:
    build:
      context: .
      dockerfile: jupyter/Dockerfile
    image: railway/jupyter:1.0.0
    container_name: railway-jupyter
    environment:
      <<: *s3-env
      ICEBERG_WAREHOUSE_PREFIX: "warehouse"
      ICEBERG_NAMESPACE: "${ICEBERG_NAMESPACE:-railway}"
      ICEBERG_TABLE: "${ICEBERG_TABLE:-train_events}"
      JUPYTER_TOKEN: "${JUPYTER_TOKEN:-railway}"
    ports:
      - "8888:8888"
    volumes:
      - ./orchestration/notebooks:/home/jovyan/work
    depends_on:
      minio-init:
        condition: service_completed_successfully
    networks:
      - railway

  # -------------------------------------------------------------------------
  # Dashboard — Streamlit UI over the two APIs (KPIs, charts, chaos generator).
  # -------------------------------------------------------------------------
  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    image: railway/dashboard:1.0.0
    container_name: railway-dashboard
    environment:
      CONSUMPTION_URL: "http://consumption-api:8001"
      INGESTION_URL: "http://ingestion-api:8000"
    ports:
      - "8501:8501"
    depends_on:
      consumption-api:
        condition: service_healthy
      ingestion-api:
        condition: service_healthy
    networks:
      - railway

networks:
  railway:
    driver: bridge

volumes:
  minio-data:
